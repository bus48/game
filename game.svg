<svg
  id="game"
  x="0"
  y="0"
  viewBox="0 0 1000 1000"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink" >

    <link xmlns="http://www.w3.org/1999/xhtml" rel="stylesheet" type="text/css" href="styles.css" />

    <!-- Bus stop -->
    <svg id="scene_exterior" class="scene hidden" x="100" y="100" width="800" height="800">
        <g id="camera_exterior">
            <image id="background_exterior" href="images\Exterior_Background.png" x="0" y="0" width="100%" height="200%" />
            <g transform="translate(0, 800)">
                <image x="50" class="character" href="images\Crowd_6L.png" />
                <image x="300" class="character" href="images\Crowd_5L.png" />
                <g id="me_exterior" class="character">
                    <image id="me_exterior_walk" class="character hidden" href="images\Me_stand.png" />
                    <image id="me_exterior_stand" class="character hidden" href="images\Me_stand.png" />
                    <image id="me_exterior_check_time" class="character hidden" href="images\Me_check_time.png" />
                </g>
                <image id="bus_exterior" class="hidden" href="images\Exterior_Bus.png" x="800" y="0" height="100%" width="200%" />
            </g>
        </g>
        <g id="interaction_view" class="hidden" transform="translate(400, 450)">
            <rect id="interaction_view_line" class="interaction_line" x="-2" y="0" width="4" height="300" />
            <image id="interaction_view_circle" class="interaction_circle" href="images\Interaction.png" x="0" y="0" />
        </g>
        <rect class="frame" />
    </svg>

    <!-- Clock -->
    <svg id="scene_clock" class="scene hidden" x="400" y="50" width="550" height="550">
        <!--<rect class="background" />-->
        <image href="images\Clock_Background.png" x="0" y="0" height="100%" width="100%" />
        <image id="clock_hour" href="images\Clock_Hour.png" x="0" y="0" width="100%" height="100%" transform="rotate(-90, 275, 275)" />
        <image id="clock_minute" href="images\Clock_Minute.png" x="0" y="0" width="100%" height="100%" />
        <g id="interaction_clock" class="hidden">
            <image id="interaction_clock_circle" class="interaction_circle" href="images\Interaction.png" x="30" y="50%" />
        </g>
    </svg>

    <!-- Bus interior -->
    <svg id="scene_interior" class="scene hidden" x="10%" y="10%" width="80%" height="80%">

        <rect id="outside_interior_color" />
        <image id="outside_interior" href="images\Interior_Outside.jpg" x="0" y="0" width="100%" height="100%" />

        <g id="bus_interior_speed">
            <g id="bus_interior_shake">
                <image id="bus_interior" href="images\Interior_Bus.png" x="-50%" y="0" height="100%" width="200%" />
                
                <image id="glow_outro_1" class="glow_outro hidden" href="images\Outro_glow_3.png" x="0" y="0" />
                <image id="glow_outro_2" class="glow_outro hidden" href="images\Outro_glow_2.png" x="0" y="0" />
                <image id="glow_outro_3" class="glow_outro hidden" href="images\Outro_glow_1.png" x="0" y="0" />

                <!-- Me -->
                <g id="me_interior" class="character hidden">
                    <image id="me_interior_walk" class="character" href="images\Me_stand.png" />
                    <image id="me_interior_stand" class="character hidden" href="images\Me_stand.png" />
                    <image id="me_interior_look" class="character hidden" href="images\Me_look.png" />
                    <image id="me_interior_stand_color" class="character hidden" href="images\Me_stand_color.png" />
                    <image id="me_interior_look_color" class="character hidden" href="images\Me_look_color.png" />
                </g>

                <!-- You -->
                <g id="you_interior" class="character hidden">
                    <image id="you_interior_walk" class="character hidden" href="images\You_walk.png" />
                    <image id="you_interior_stand" class="character hidden" href="images\You_walk.png" />
                    <image id="you_interior_look" class="character hidden" href="images\You_look.png" />
                    <image id="you_interior_smile" class="character hidden" href="images\You_walk.png" />
                </g>

                <!-- Crowd -->
                <g id="crowd_1" class="hidden"><image class="character" href="images\Crowd_1.png" /></g>
                <g id="crowd_2" class="hidden"><image class="character" href="images\Crowd_5.png" /></g>
                <g id="crowd_3" class="hidden"><image class="character" href="images\Crowd_3.png" /></g>
                <g id="crowd_4" class="hidden"><image class="character" href="images\Crowd_2.png" /></g>
                <g id="crowd_5" class="hidden"><image class="character" href="images\Crowd_4.png" /></g>
                <g id="crowd_6" class="hidden"><image class="character" href="images\Crowd_6.png" /></g>
            </g>
        </g>
                
        <!-- Interaction -->
        <g id="interaction_look" class="hidden" transform="translate(245, 380)">
            <image href="images\Interaction_look.png" x="-65" y="-60" />
            <rect id="interaction_look_line" class="interaction_line" x="0" y="-2" width="280" height="4" />
            <image id="interaction_look_circle" class="interaction_circle" href="images\Interaction.png" x="0" y="0" />
        </g>

        <!--<image id="text_outro" class="hiddenx" href="images\Outro_text.png" x="150" y="400" width="500" />-->
        <image id="text_outro" class="hidden" href="images\Outro_text.png" x="410" y="100" width="350" />

        <rect class="frame" />
    </svg>
</svg>